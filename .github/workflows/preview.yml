# Déploiement automatique d'un « preview channel » Firebase Hosting à chaque push
# sur une branche de travail. Chaque branche obtient sa propre URL temporaire
# (ex: https://estimavrd-app--claude-unit-manager-xxxx.web.app), sans jamais
# toucher la prod. Idéal pour tester sur tablette (Wi-Fi ou 4G).
#
# ── SECRETS À CRÉER (Settings → Secrets and variables → Actions) ──────────────
#   FIREBASE_SERVICE_ACCOUNT_ESTIMAVRD  (JSON du compte de service Firebase)
#   VITE_FIREBASE_API_KEY
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
#   VITE_SENTRY_DSN                     (optionnel)
# Voir README ou les instructions ci-dessous pour générer le compte de service.

name: Firebase Preview

on:
  push:
    branches:
      - 'claude/**'
      - 'feature/**'
  workflow_dispatch: {} # permet aussi un lancement manuel depuis l'onglet Actions

# Un seul déploiement à la fois par branche : un nouveau push annule le run en cours.
concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: write # laisse l'action commenter l'URL si un jour un push est lié à une PR

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_ENV: preview
        run: npm run build

      # Nom de channel sûr, dérivé du nom de branche (slashes/caractères → tirets,
      # minuscules, tronqué). Ex: "claude/unit-manager-proposal" → "claude-unit-manager-proposal".
      - name: Compute channel id
        id: channel
        run: |
          raw="${GITHUB_REF_NAME}"
          safe=$(echo "$raw" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/-\{2,\}/-/g' | cut -c1-40 | sed 's/-$//')
          echo "id=$safe" >> "$GITHUB_OUTPUT"

      - name: Deploy to Firebase preview channel
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ESTIMAVRD }}
          projectId: estimavrd-app
          channelId: ${{ steps.channel.outputs.id }}
          expires: 7d

      - name: Publier l'URL dans le résumé du run
        if: always() && steps.deploy.outputs.details_url != ''
        run: |
          {
            echo "## 🔗 Preview déployé"
            echo ""
            echo "Branche : \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "**URL (ouvrable sur tablette) :** ${{ steps.deploy.outputs.details_url }}"
            echo ""
            echo "_Expire dans 7 jours._"
          } >> "$GITHUB_STEP_SUMMARY"
